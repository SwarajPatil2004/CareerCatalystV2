services:
  db:
    image: postgres:15-alpine
    container_name: careercatalyst-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-careercatalyst}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: careercatalyst-redis-prod
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: careercatalyst-backend-prod
    env_file: .env.prod
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: careercatalyst-frontend-prod
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: careercatalyst-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_prod_data:
