services:
  db:
    image: postgres:15-alpine
    container_name: careercatalyst-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careercatalyst
    ports:
      - "5433:5432" # Host:Container (using 5433 on host to avoid conflict with local postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: careercatalyst-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: careercatalyst-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: careercatalyst-worker
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    env_file: .env
    depends_on:
      - db
      - redis
    restart: always

  celery_flower:
    image: mher/flower
    container_name: careercatalyst-flower
    command: ["celery", "-A", "app.core.celery_app", "flower"]
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: always

volumes:
  postgres_data:
