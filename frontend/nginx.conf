server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend API if needed (optional, depends on architecture)
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    # }
}
